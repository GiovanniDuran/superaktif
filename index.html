
<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17996303192"></script> 
    <script> 
        window.dataLayer = window.dataLayer || []; 
        function gtag(){dataLayer.push(arguments);} 
        gtag('js', new Date()); 
        gtag('config', 'AW-17996303192'); 
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Circular Progress Styles */
        .circular-progress {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        .circular-progress svg {
            transform: rotate(-90deg); /* Starts the fill at the top */
            width: 100%;
            height: 100%;
        }

        .circular-progress circle {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
        }

        .circular-progress .bg {
            stroke: #333;
        }

        .circular-progress .progress-ring {
            stroke: #fff;
            /* 2 * pi * r (where r = 45) ≈ 283 */
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 0.1s linear;
        }

        .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 22px;
            font-weight: bold;
        }

        .text {
            color: #666;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circular-progress">
            <svg viewBox="0 0 100 100">
                <circle class="bg" cx="50" cy="50" r="45"></circle>
                <circle class="progress-ring" id="progressRing" cx="50" cy="50" r="45"></circle>
            </svg>
            <div class="percentage" id="percentageText">0%</div>
        </div>
        <p class="text">Loading...</p>
    </div>

    <script>
        // Configuration
        const REDIRECT_URL = "https://123indoplay.xyz/registration?tid=319"; 
        const LOADING_DURATION = 1000; // Duration in milliseconds (1 second)

        const progressRing = document.getElementById('progressRing');
        const percentageText = document.getElementById('percentageText');
        const CIRCUMFERENCE = 283; // Circumference of the circle (2 * Math.PI * 45)
        
        let progress = 0;

        // Function to update the DOM elements
        function updateProgress(percent) {
            // Calculate the stroke offset for the circle
            const offset = CIRCUMFERENCE - (percent / 100) * CIRCUMFERENCE;
            progressRing.style.strokeDashoffset = offset;
            
            // Update the text
            percentageText.innerText = Math.round(percent) + '%';
        }

        // Simulate progress
        const interval = setInterval(() => {
            progress += Math.random() * 40;
            if (progress > 90) progress = 90;
            updateProgress(progress);
        }, 200);

        // Redirect after loading duration
        setTimeout(() => {
            clearInterval(interval);
            updateProgress(100); // Jump to 100% right before redirect
            
            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 300);
        }, LOADING_DURATION);
    </script>
</body>
</html>
